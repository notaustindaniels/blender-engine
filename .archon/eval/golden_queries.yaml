  # --- catalog campaign (D-008): newly-cataloged external-discovery items (click_to_get, provisional).
  # Retrieval eval only — proves the grown KB surfaces the discovery cards; NOT a coverage claim (R14). ---
  - q: "open source procedural spaceship generator addon"
    expect: [spaceship]
  - q: "node based parametric modeling tool like houdini"
