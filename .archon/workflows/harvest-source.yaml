name: harvest-source
description: |
  Single-lane harvest workhorse (SPEC §6.1): enumerate -> normalize -> (L5 $0-checkout approval)
  -> acquire -> prescan -> verify (3-version Docker matrix via probe.py) -> enrich -> index ->
  coverage -> report. Run ONCE PER LANE in its own worktree, e.g.
  `archon workflow run harvest-source --branch harvest/l1 "L1"`. Never combine lanes. Use
  verify-batch to re-verify an existing vault; coverage-report to just rebuild the matrix.
interactive: true          # required: the L5 acquire-gate approval must reach the UI (§6.1)
worktree:
  enabled: true            # the harvest writes files — force isolation (§6.1, good-practice #9)
model: sonnet              # only the AI nodes (enrich/report) use it; all glue is deterministic

nodes:
  - id: serve
    bash: bash progress/serve.sh          # rider 8: relaunch the follow-along server at run start
    timeout: 15000

  - id: lane
    depends_on: [serve]
    bash: printf %s $ARGUMENTS
    timeout: 5000

  - id: enumerate
    depends_on: [lane]
    timeout: 300000
    bash: |
      set -euo pipefail
      LANE=$lane.output
      LANE=${LANE:-L1}
      case "$LANE" in
        L1)  uv run .archon/scripts/enumerate/l1_extensions.py --out candidates/L1.jsonl --categories terrain,vegetation ;;
        L2)  uv run .archon/scripts/enumerate/l2_github.py  --out candidates/L2.jsonl ;;
        L3)  uv run .archon/scripts/enumerate/l3_forum.py   --out candidates/L3.jsonl ;;
        L4)  uv run .archon/scripts/enumerate/l4_bnation.py --out candidates/L4.jsonl ;;
        L5a|L5b) bun run .archon/scripts/l5_discover.ts --lane "$LANE" ;;
        *) echo "unknown lane: $LANE" >&2; exit 1 ;;
      esac

  - id: normalize
    depends_on: [enumerate]
    script: normalize
    runtime: uv

  - id: acquire-gate
    depends_on: [normalize]
    when: "$lane.output == 'L5a' || $lane.output == 'L5b'"
    approval:
      message: |
        L5 marketplace lane: complete the $0 checkouts in the buyer UI (ToS + CAPTCHA are
        human-gated — PRD guardrail #2), then approve to sweep durable re-download links.
        L1-L4 skip this gate automatically.

  - id: acquire
    depends_on: [normalize, acquire-gate]
    trigger_rule: none_failed_min_one_success
    script: acquire
    runtime: uv

  - id: prescan
    depends_on: [acquire]
    timeout: 120000
    bash: |
      set -euo pipefail
      uv run .archon/scripts/prescan_batch.py >/dev/null 2>&1 || true   # rider 6: batched findings
      python3 -c "import json,os; p='reports/prescan-findings.json'; print(len(json.load(open(p))['still_blocked']) if os.path.exists(p) else 0)"

  - id: prescan-review
    depends_on: [prescan]
    when: "$prescan.output > '0'"
    approval:
      message: |
        Prescan flagged one or more artifacts as needs_review (see reports/prescan-findings.md).
        Inspect the gating patterns, then either add a cited entry to reviews/prescan_clearances.yaml
        or extend reviews/prescan-allowlist.yaml, and approve. Allowlisted-only artifacts already
        cleared automatically; the exec/network-capable patterns can never be allowlisted.

  - id: verify
    depends_on: [prescan, prescan-review]
    trigger_rule: none_failed_min_one_success
    timeout: 600000
    bash: |
      set -euo pipefail
      uv run .archon/scripts/verify_matrix.py --artifacts vault --out manifests --timeout 150

  - id: enrich
    depends_on: [verify]
    context: fresh
    command: enrich-manifest

  - id: index
    depends_on: [enrich]
    script: build_index
    runtime: uv

  - id: coverage
    depends_on: [index]
    script: coverage
    runtime: uv

  - id: report
    depends_on: [coverage]
    context: fresh
    command: write-coverage
