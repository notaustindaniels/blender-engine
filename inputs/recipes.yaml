  note: Base terrain step (A.N.T. landscape_add) is modal; SUBSURF alone is not a lake. Parked reason=modal.
- niche: sediment_deposition
  tier: recipe_unverified
  steps:
  - op: object.create_terrain_operator
    artifact_cid: petak5__bp
    params: {}
  - op: object.erosion_operator
    artifact_cid: petak5__bp
    params: {}
  note: petak5 create_terrain drives (delta); erosion_operator is modal-noop headless. create_terrain alone makes terrain
    not sediment, so honest tier stays unverified until erosion drives.
