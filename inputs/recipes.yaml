  tier: recipe_verified
  steps:
  - op: curve.tree_add
    artifact_cid: community__sapling-tree-gen
    params: {}
  - builtin: ARRAY
  note: 'PIVOT: sapling tree_add (non-modal, drives) + built-in ARRAY modifier => rows of trees = orchard. Both non-modal.'
- niche: snowdrift_generator
  tier: recipe_unverified
