# taxonomy.yaml — niche taxonomy for the Stage-1 corpus (SPEC §4.1 schema, with additive keys)
# VERSION 2 — strict superset of v1. Every wave-1 entry is unchanged; wave-2 adds the
# owner's emergent-formation / diegetic-dataviz brainstorm plus ecosystem expansion.
#
# Provenance: wave 1 reconstructed 2026-07-05 from the owner's original taxonomy document
# (paste/OCR corruption flagged inline, never papered over). Wave 2 added 2026-07-05 from
# the owner's second brainstorm document (swarm/force/craft/erosion/light/architecture/
# bio-growth/liquid groups + meta-patterns), the engine design conversation, and
# high-confidence cross-DCC ecosystem knowledge.
#
# Conventions (ADDITIVE to SPEC §4.1 — validators MUST tolerate unknown keys):
#   core omitted             => core: false
#   wave omitted             => wave: 1   (wave-2 entries carry wave: 2 + origin)
#   origin                   => user_brainstorm_2 | engine_design | ecosystem_expansion
#   verbs: []                => pure-utility niche; no physical verb applies
#   reconstructed: true      => id/alias rebuilt from a damaged fragment (wave 1 only)
#   declared_count           => count stated in the wave-1 source document (wave 1 only)
#   unrecovered_count/hints  => wave-1 niches lost to corruption, recorded as counts +
#                               raw fragments — deliberately NOT placeholder entries
#
# ★ EXPLICIT DECISION 2026-07-05 (per SPEC §4.4/§12 freeze rule): the verb enum is
#   extended by exactly ONE verb — `aggregate` (many small units self-organize into a
#   target shape). Required by the emergent-formation tier; no other extension. The
#   builder should append the same dated note to SPEC §4.4.
#
# ★ GATE ISOLATION: PRD §3/§4 targets and the step-3 thin-slice gate compute on
#   wave-1 niches ONLY (wave absent or 1). Wave-2 coverage is reported in a separate
#   table and never moves the gate. Rationale: the PRD hypothesis was calibrated on the
#   wave-1 denominator; expansion is added intelligence, not a moving goalpost.
#
# Verb enum (v2): generate, scatter, trace, stack, accumulate, branch, fill, deplete,
#                 reveal, illuminate, simulate, deform, aggregate
#
# Coverage denominators = niches PRESENT per wave (see meta). ids are FROZEN once the
# first coverage run lands; later renames require an alias-preserving migration.

