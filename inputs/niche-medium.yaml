# niche -> medium map (D-003 R22). Medium = the physical domain the metaphor resolver groups by:
# ground | water | air | urban | organic | abstract. Terrain+Veg wave-1 niches classified; other
# niches default to 'abstract' until classified. This feeds the verb×medium grid — the Stage-2
# consumer metric (niches are substitutable within a medium; verbs are not).
medium:
  # Terrain — mostly ground; water/air where the physical domain differs
