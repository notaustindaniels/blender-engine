# seed-anchors.yaml — hand-verified starter set (SPEC §0.2).
#
# EVERY entry was LIVE-VERIFIED on 2026-07-05 against a source fetched this session
# (extensions.blender.org /api/v1, GitHub repo/manifest/raw source, or the Blender manual)
# — never from model memory. This directly enforces the PRD zero-fabrication rule on the
# builder. The `verified` field on each entry records how.
#
# Anchors calibrate the Gate golden set (§8) and seed L2 GitHub star-graph expansion
# (L2 is build-seq step 5 — OUT of the Stage-1 thin-slice scope).
#
# REALITY THAT SHAPES THE GOLDEN SET (all live-confirmed):
#  - A.N.T. Landscape / Sapling Tree Gen / IvyGen were BUNDLED in Blender 3.6 & 4.1 and
#    REMOVED in the 4.2 extensions migration. They now exist ONLY as extensions.blender.org
#    add-ons declaring blender_version_min >= 4.2. Consequence: the extension ZIP is
#    expected to install on 4.2/4.5 but NOT on 3.6 (no extensions system pre-4.2); on 3.6
#    the same tool is reachable only as the bundled module.
#  - Several anchors declare min 4.4/4.5, so their ONLY correct passing version is 4.5.
#  - ocean / mantaflow / dynamic_paint are CORE Blender features (modifiers / sim systems),
#    not installable add-ons — recorded for completeness, not used as install targets.

