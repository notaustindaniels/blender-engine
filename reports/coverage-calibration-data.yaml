# R15 market-existence audit data (D-002 R15) — 2026-07-06. Per-niche verdict on whether ANY free
# path (dedicated tool OR plausible free recipe) exists for the 59 Terrain+Veg wave-1 niches.
# Evidence = cached extensions.blender.org catalog mine + live web research (WebSearch/WebFetch,
# 2026-07-06). Verdicts are honestly confidence-graded; this is a PROPOSAL for the owner's D-003
# decision, NOT a coverage claim. No target changes here (recalibration-by-fiat is forbidden, R15).
#
# verdict vocabulary:
#   verified_free  : a free tool ALREADY passed our probe (the 7 covered niches) — decision-grade
#   free_tool      : a free dedicated add-on exists (evidence), not yet in our vault/probed
#   free_recipe    : no dedicated free add-on, but a plausible free recipe (built-ins/GN/free packs)
#   paid_only      : tools exist but only paid (marketplace) — excluded by the PRD free constraint
#   none           : no known free tool AND no plausible free recipe (structurally hard / no market)
#
# attainable (counts toward the proposed "attainable base") = verified_free | free_tool | free_recipe.
# NOT attainable = paid_only | none.

