# Golden-set expected states (SPEC §8). bar (b) = the probe returns exactly these states for
# every golden artifact on Blender 3.6, 4.2, 4.5. Each expectation is derived from the
# artifact's TRUE nature + headless reality (not fitted to the probe), then confirmed.
#
# States: pass | partial | fail | legacy | quarantine (SPEC §3.1). pass AND partial both
# "survive verification" and count toward coverage; the distinction is a quality signal.
expected:
  golden_good_cube:
    states: {"3.6": pass, "4.2": pass, "4.5": pass}
    why: "clean generator; operator creates geometry via bmesh and drives headless -> full 5-check pass."
  golden_noop:
    states: {"3.6": partial, "4.2": partial, "4.5": partial}
    why: "enables + registers an operator + renders, but the operator makes no geometry -> no smoke delta."
  golden_legacy_27x:
    states: {"3.6": legacy, "4.2": legacy, "4.5": legacy}
    why: "declares blender (2,7,9); register_module was removed in 2.8+ so it never registers -> legacy."
  golden_broken:
    states: {"3.6": fail, "4.2": fail, "4.5": fail}
    why: "not a valid zip archive -> install cannot even begin."
  antlandscape:
    states: {"3.6": fail, "4.2": partial, "4.5": partial}
    why: "extension (min 4.2): no extension system on 3.6 -> fail; mesh.landscape_add is a dialog-only operator that returns PASS_THROUGH headless -> partial."
  ivygen:
    states: {"3.6": fail, "4.2": partial, "4.5": partial}
    why: "extension (min 4.2); curve.ivy_gen is dialog/context-dependent headless -> partial."
  tissue:
    states: {"3.6": fail, "4.2": pass, "4.5": pass}
    why: "extension (min 4.2); a tessellation operator produces a mesh delta headless -> pass."
  cellfracture:
    states: {"3.6": fail, "4.2": pass, "4.5": pass}
    why: "extension (min 4.2); a fracture operator produces geometry headless -> pass."
  sapling:
    states: {"3.6": fail, "4.2": fail, "4.5": pass}
    why: "extension min 4.4 -> below-minimum on 3.6 AND 4.2 (fail); curve.tree_add drives headless on 4.5 -> pass. This is the version-gating proof."

# Prescan is a separate gate (SPEC §3.4) — asserted directly, not via the probe.
prescan_expected:
  golden_danger: needs_review     # contains subprocess/eval(/__import__/urllib
  golden_good_cube: clean
  golden_noop: clean
